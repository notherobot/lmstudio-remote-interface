<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="theme-color" content="#1a1a2e">
  <title>LM Studio Remote</title>
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icon-192.png">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="app">
    <!-- Connection Banner -->
    <div id="connection-banner" class="banner hidden">
      <div class="banner-content">
        <h2>Connect to LM Studio</h2>
        <p>Enter your LM Studio server address and port</p>
        <div class="connect-form">
          <div class="input-row">
            <input type="text" id="server-url" placeholder="localhost:1234" autocomplete="off" inputmode="url">
            <button id="connect-btn" class="btn-primary">Connect</button>
          </div>
          <label class="checkbox-row">
            <input type="checkbox" id="save-connection" checked>
            <span>Remember this connection</span>
          </label>
        </div>
      </div>
    </div>

    <!-- Header -->
    <header id="header">
      <div class="header-left">
        <button id="sidebar-toggle" class="icon-btn" aria-label="Settings">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
        </button>
        <div id="status-indicator" class="status disconnected" title="Disconnected"></div>
        <span id="header-title">LM Studio Remote</span>
      </div>
      <div class="header-right">
        <select id="model-select" class="model-dropdown" disabled>
          <option value="">No models</option>
        </select>
        <button id="clear-chat-btn" class="icon-btn" aria-label="Clear chat" title="Clear chat">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 6h18"/><path d="M8 6V4h8v2"/><path d="M5 6l1 14h12l1-14"/><path d="M10 11v6"/><path d="M14 11v6"/></svg>
        </button>
      </div>
    </header>

    <!-- Sidebar -->
    <div id="sidebar-overlay" class="overlay hidden"></div>
    <aside id="sidebar" class="hidden">
      <div class="sidebar-header">
        <h3>Settings</h3>
        <button id="sidebar-close" class="icon-btn" aria-label="Close">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
        </button>
      </div>

      <div class="sidebar-content">
        <div class="setting-group">
          <label for="sidebar-server-url">Server Address</label>
          <div class="input-row">
            <input type="text" id="sidebar-server-url" placeholder="localhost:1234" inputmode="url">
            <button id="sidebar-connect-btn" class="btn-primary btn-sm">Connect</button>
          </div>
        </div>

        <div class="setting-group">
          <label for="system-prompt">System Prompt</label>
          <textarea id="system-prompt" rows="3" placeholder="You are a helpful assistant."></textarea>
        </div>

        <div class="setting-group">
          <label for="temperature">Temperature: <span id="temp-value">0.7</span></label>
          <input type="range" id="temperature" min="0" max="2" step="0.1" value="0.7">
        </div>

        <div class="setting-group">
          <label for="max-tokens">Max Tokens: <span id="tokens-value">2048</span></label>
          <input type="range" id="max-tokens" min="64" max="8192" step="64" value="2048">
        </div>

        <div class="setting-group">
          <label class="checkbox-row">
            <input type="checkbox" id="stream-toggle" checked>
            <span>Stream responses</span>
          </label>
        </div>

        <div class="setting-group">
          <button id="clear-settings-btn" class="btn-danger">Reset All Settings</button>
        </div>
      </div>
    </aside>

    <!-- Chat Area -->
    <main id="chat-container">
      <div id="messages"></div>
    </main>

    <!-- Input Area -->
    <footer id="input-area">
      <div class="input-wrapper">
        <textarea id="user-input" placeholder="Type a message..." rows="1"></textarea>
        <button id="send-btn" class="send-button" disabled aria-label="Send">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
        </button>
        <button id="stop-btn" class="stop-button hidden" aria-label="Stop">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><rect x="6" y="6" width="12" height="12" rx="2"/></svg>
        </button>
      </div>
    </footer>
  </div>

  <script src="marked.min.js"></script>
  <script src="app.js"></script>
</body>
</html>
