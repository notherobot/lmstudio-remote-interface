<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="theme-color" content="#171717">
  <title>LM Studio Chat</title>
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icon-192.png">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="app">

    <!-- Setup Screen (first visit only) -->
    <div id="setup" class="setup">
      <div class="setup-card">
        <h1>LM Studio Chat</h1>
        <p class="setup-sub">Enter your Tailscale IP to connect</p>

        <div class="setup-field">
          <label for="setup-url">Tailscale IP + Port</label>
          <input type="text" id="setup-url" placeholder="100.x.x.x:1234" autocomplete="off" spellcheck="false" inputmode="url">
          <p class="setup-hint">Find your PC's Tailscale IP in the Tailscale app or at <a href="https://login.tailscale.com/admin/machines" target="_blank" class="link-btn" style="text-decoration:underline;font-size:inherit">login.tailscale.com</a><br>On the same PC? Use <button type="button" class="link-btn" id="use-localhost">localhost:1234</button></p>
        </div>

        <button id="setup-connect" class="btn-connect">Connect</button>
        <p id="setup-error" class="setup-error hidden"></p>
      </div>
    </div>

    <!-- Sidebar -->
    <div id="sidebar-overlay" class="overlay hidden"></div>
    <aside id="sidebar" class="hidden">
      <div class="sidebar-header">
        <h3>Settings</h3>
        <button id="sidebar-close" class="icon-btn" aria-label="Close">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
        </button>
      </div>
      <div class="sidebar-content">
        <div class="setting-group">
          <label for="sidebar-url">Tailscale IP + Port</label>
          <input type="text" id="sidebar-url" placeholder="100.x.x.x:1234" spellcheck="false">
          <button id="sidebar-reconnect" class="btn-sm">Reconnect</button>
        </div>
        <div class="setting-group">
          <label for="system-prompt">System Prompt</label>
          <textarea id="system-prompt" rows="4" placeholder="You are a helpful assistant."></textarea>
        </div>
        <div class="setting-group">
          <label for="temperature">Temperature: <span id="temp-value">0.7</span></label>
          <input type="range" id="temperature" min="0" max="2" step="0.1" value="0.7">
        </div>
        <div class="setting-group">
          <label for="max-tokens">Max Tokens: <span id="tokens-value">2048</span></label>
          <input type="range" id="max-tokens" min="64" max="8192" step="64" value="2048">
        </div>
        <div class="setting-group">
          <label class="checkbox-row">
            <input type="checkbox" id="stream-toggle" checked>
            <span>Stream responses</span>
          </label>
        </div>
        <div class="setting-group">
          <button id="disconnect-btn" class="btn-danger">Disconnect &amp; Change Server</button>
        </div>
      </div>
    </aside>

    <!-- Header -->
    <header id="header" class="hidden">
      <div class="header-left">
        <button id="sidebar-toggle" class="icon-btn" aria-label="Settings">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
        </button>
        <div id="status-indicator" class="status disconnected"></div>
        <select id="model-select" class="model-dropdown" disabled>
          <option value="">Loading...</option>
        </select>
      </div>
      <div class="header-right">
        <button id="new-chat-btn" class="icon-btn" aria-label="New chat" title="New chat">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 5v14"/><path d="M5 12h14"/></svg>
        </button>
      </div>
    </header>

    <!-- Chat Area -->
    <main id="chat-container" class="hidden">
      <div id="messages">
        <div id="welcome" class="welcome-chat">
          <p>What can I help you with?</p>
        </div>
      </div>
    </main>

    <!-- Input Area -->
    <footer id="input-area" class="hidden">
      <div class="input-wrapper">
        <textarea id="user-input" placeholder="Message your model..." rows="1"></textarea>
        <button id="send-btn" class="send-button" disabled aria-label="Send">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M5 12h14"/><path d="M12 5l7 7-7 7"/></svg>
        </button>
        <button id="stop-btn" class="stop-button hidden" aria-label="Stop">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><rect x="6" y="6" width="12" height="12" rx="2"/></svg>
        </button>
      </div>
      <p class="input-footer">Connected via Tailscale to your LM Studio</p>
    </footer>
  </div>

  <script src="marked.min.js"></script>
  <script src="app.js"></script>
</body>
</html>
